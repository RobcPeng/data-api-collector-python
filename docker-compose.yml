services:
  # ---  core services ---
  postgres:
    image: postgres:15
    container_name: data-api-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT_EXTERNAL:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network

  elasticsearch:
    image: elasticsearch:9.1.2
    container_name: data-api-elasticsearch
    user: "1000:1000"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - app-network
    restart: unless-stopped

  neo4j:
    image: neo4j:community
    container_name: data-api-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474" # HTTP Browser interface
      - "127.0.0.1:7687:7687" # Bolt protocol
    environment:
      # Authentication
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}

      # Memory settings
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m

      # Security and plugins
      NEO4J_dbms_security_procedures_unrestricted: gds.*,apoc.*
      NEO4J_dbms_security_procedures_allowlist: gds.*,apoc.*
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'

      # Logging
      NEO4J_dbms_logs_debug_level: INFO

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins

    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8.2.1
    container_name: data-api-redis
    ports:
      - "127.0.0.1:${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.7.2
    container_name: data-api-kafka
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://${KAFKA_BOOTSTRAP_SERVERS},EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:${KAFKA_EXTERNAL_PORT:-9093}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 1K3nNMtBSUyskd4d6I_Esg
      # SASL auth for external listener only
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/jaas/kafka_server_jaas.conf"
    restart: unless-stopped
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./kafka_server_jaas.conf:/etc/kafka/jaas/kafka_server_jaas.conf:ro
    networks:
      - app-network

  app:
    build: .
    container_name: data-api-app
    depends_on:
      - postgres
      - redis
      - kafka
      - neo4j
    environment:
      POSTGRES_SERVER: ${POSTGRES_SERVER}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      API_V1_STR: ${API_V1_STR}
      PROJECT_NAME: ${PROJECT_NAME}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE}
      NEO4J_MAX_CONNECTION_LIFETIME: ${NEO4J_MAX_CONNECTION_LIFETIME}
      NEO4J_MAX_CONNECTION_POOL_SIZE: ${NEO4J_MAX_CONNECTION_POOL_SIZE}
      NEO4J_CONNECTION_TIMEOUT: ${NEO4J_CONNECTION_TIMEOUT}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    container_name: data-api-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - app
    networks:
      - app-network

  # ---  other services ---
  ocr-service:
    build:
      context: ./services/ocr_service
      dockerfile: Dockerfile
    container_name: ocr-service
    restart: unless-stopped
    profiles: ["ocr"]
    environment:
      - MODEL_TYPE=${MODEL_TYPE}
      - HF_HOME=/cache
    volumes:
      - ocr_cache:/cache
    networks:
      - app-network
    expose:
      - "8002"
    deploy: # Uncomment for GPU access
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  spark-generator:
    build:
      context: ./services/spark_generator
      dockerfile: Dockerfile
    container_name: spark-generator
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - app-network
    expose:
      - "8003"

  # embedder-service:
  #   build:
  #     context: ./services/embedder_service
  #     dockerfile: dockerfile
  #   container_name: embedder-service
  #   restart: unless-stopped
  #   environment:
  #     - HF_HOME=/cache
  #   volumes:
  #     - embedding_cache:/cache
  #   networks:
  #     - app-network
  #   expose:
  #     - "8003"
  # deploy: # Uncomment for GPU access
  #   resources:
  #     reservations:
  #       devices:
  #         - driver: nvidia
  #           count: 1
  #           capabilities: [gpu]

# ---  end services ---
volumes:
  postgres_data:
  redis_data:
  elastic_data:
  kafka_data:
  caddy_data:
  caddy_config:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  ocr_cache:
networks:
  app-network:
    driver: bridge
